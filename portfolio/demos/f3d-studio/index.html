  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            /* ── Green primary palette (shadcn-inspired) ── */
            primary:          "#16a34a",   /* green-600 */
            "primary-dark":   "#15803d",   /* green-700 */
            "primary-light":  "#bbf7d0",   /* green-200 */
            action:           "#16a34a",
            /* ── Neutral surfaces ── */
            "background-light": "#f8fafc",
            "background-dark":  "#0c0f10",
            "surface-light":    "#ffffff",
            "surface-dark":     "#181a1b",
            "border-light":     "#e2e8f0",
            "border-dark":      "#334155",
            "outline-variant":  "#94a3b8",
            "surface-container":     "#f1f5f9",
            "surface-container-low": "#f8fafc",
            "on-surface":         "#0f172a",

          },
          fontFamily: {

  <style>
  /* ── Base ── */
  body {
    font-family: 'DM Sans', 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    background-color: #f8fafc;
    color: #0f172a;
  }

  /* ── Typography tokens ── */
  .label-clinical {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: #64748b;
    text-transform: none;
  }

  .section-header {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: #1e293b;
    text-transform: none;
  }

  /* ── Transitions ── */
  .btn-transition { transition: all 0.15s ease; }

  /* ── Tonal divider ── */
  .divider-tonal { border-bottom: 1px solid #e2e8f0; }

  /* ── Sliders ── */
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    background: transparent;
  }
  input[type=range]::-webkit-slider-runnable-track {
    width: 100%;
    height: 4px;
    cursor: pointer;
    background: #e2e8f0;
    border-radius: 9999px;
  }
  input[type=range]::-webkit-slider-thumb {
    height: 16px;
    width: 16px;
    background: #16a34a;
    cursor: pointer;
    -webkit-appearance: none;
    margin-top: -6px;
    border-radius: 9999px;
    box-shadow: 0 0 0 3px #bbf7d0;
    transition: box-shadow 0.15s ease;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 0 5px #86efac;
  }
  input[type=range]::-moz-range-track {
    width: 100%;
    height: 4px;
    cursor: pointer;
    background: #e2e8f0;
    border-radius: 9999px;
  }
  input[type=range]::-moz-range-thumb {
    height: 16px;
    width: 16px;
    background: #16a34a;
    cursor: pointer;
    border-radius: 9999px;
    border: none;
    box-shadow: 0 0 0 3px #bbf7d0;
  }

  /* ── Scrollbar ── */
  .custom-scrollbar::-webkit-scrollbar { width: 4px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 9999px;
  }

  /* ── Panel & Layout transitions ── */
  .panel-transition { transition: background-color 0.2s ease, border-color 0.2s ease; }

  /* ── Animate-in utilities ── */
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideDown { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes stepShimmer {
    0%   { transform: translateX(-120%); }
    60%  { transform: translateX(120%); }
    100% { transform: translateX(120%); }
  }
  .fade-in    { animation: fadeIn  0.25s ease forwards; }
  .slide-up   { animation: slideUp 0.3s ease forwards; }
  .animate-in { animation: fadeIn  0.2s ease forwards; }
  .slide-in-from-bottom-2 { animation: slideUp 0.2s ease forwards; }
  .slide-in-from-top-2    { animation: slideDown 0.2s ease forwards; }

  /* ── Dark mode body ── */
  html.dark body { background-color: #0c0f10; color: #f1f5f9; }
  </style>
