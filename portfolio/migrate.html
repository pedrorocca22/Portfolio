<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Migrador de Proyectos — Firebase</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: var(--sp-4);
    }
    .card {
      background: white;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #64748B;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      background: #0F172A;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover {
      background: #1E293B;
    }
    #status {
      margin-top: 24px;
      padding: 16px;
      background: #F1F5F9;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      max-height: 250px;
      overflow-y: auto;
      display: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🚀 Migrar Proyectos a Firebase</h1>
    <p>Este asistente subirá los proyectos definidos localmente en <strong>projects.js</strong> directamente a tu nueva base de datos Firestore en la nube.</p>
    
    <button id="btn-migrate">Iniciar Migración</button>
    <div id="status"></div>
  </div>

  <!-- Firebase & Config -->
  <script src="projects.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    document.getElementById('btn-migrate').addEventListener('click', async () => {
      const btn = document.getElementById('btn-migrate');
      const statusDiv = document.getElementById('status');
      
      btn.disabled = true;
      btn.textContent = "Migrando...";
      statusDiv.style.display = "block";
      statusDiv.innerHTML = "Iniciando migración...\n";

      if (typeof PROJECTS === 'undefined') {
        statusDiv.innerHTML += "❌ Error: No se encontró la base de datos local 'PROJECTS'. Asegúrate de que projects.js está en la misma carpeta.";
        btn.disabled = false;
        btn.textContent = "Iniciar Migración";
        return;
      }

      if (typeof db === 'undefined') {
        statusDiv.innerHTML += "❌ Error: Firebase no se inicializó correctamente. Comprueba las claves en firebase-config.js.";
        btn.disabled = false;
        btn.textContent = "Iniciar Migración";
        return;
      }

      try {
        for (const p of PROJECTS) {
          statusDiv.innerHTML += `Subiendo: "${p.title}"...`;
          
          await db.collection("projects").doc(p.id).set({
            title: p.title,
            category: p.category,
            tags: p.tags,
            year: p.year,
            summary: p.summary,
            description: p.description,
            images: p.images,
            github: p.github || "",
            demoPath: p.demoPath || "",
            status: p.status || ""
          });
          
          statusDiv.innerHTML += ` ✅ Éxito!\n`;
        }
        
        statusDiv.innerHTML += `\n🎉 🎉 ¡MIGRACIÓN COMPLETADA CON ÉXITO! 🎉 🎉\n\nTodos los proyectos están ahora en tu base de datos de Firestore. Ya puedes cerrar esta pestaña.`;
        btn.textContent = "Migración Exitosa";
      } catch (err) {
        statusDiv.innerHTML += `\n❌ Error durante la migración: ${err.message}\n\nNota: Asegúrate de haber activado 'Cloud Firestore' en tu consola de Firebase (en modo prueba o con reglas de lectura/escritura abiertas).`;
        btn.disabled = false;
        btn.textContent = "Reintentar Migración";
        console.error(err);
      }
    });
  </script>

</body>
</html>
